<script>
    let db_accs = JSON.parse(localStorage.getItem('sv_accs_v26')) || [
        {u:"admin", p:"svga2026", addr:"3/F Cyberzone SM Southmall, Las Piñas City", email:"svgasouthmall@gmail.com", contact:"Viber: 09668861060 | Tel: 02-8332-9486"}
    ];
    
    let db_inv = []; 
    let cart = [];
    let editIdx = -1;
    let currentUser = "";

    const CLOUD_URL = "https://api.npoint.io/08cb7a79ec36437d7a18"; 

    async function loadCloudInv() {
        try {
            const res = await fetch(CLOUD_URL);
            if (res.ok) {
                const data = await res.json();
                db_inv = data || [];
                drawInv();
            }
        } catch (e) {
            db_inv = JSON.parse(localStorage.getItem('sv_inv_v26')) || [];
            drawInv();
        }
    }

    async function saveCloudInv() {
        localStorage.setItem('sv_inv_v26', JSON.stringify(db_inv));
        try {
            await fetch(CLOUD_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(db_inv)
            });
        } catch (e) {
            console.log("Cloud sync error.");
        }
    }

    function login() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        const acc = db_accs.find(a => a.u.toLowerCase() === u && a.p === p);
        if(acc) {
            currentUser = acc.u;
            document.getElementById('loginOverlay').style.display = 'none';
            document.querySelector('.container').style.display = 'grid';
            
            document.getElementById('txtUser').innerText = acc.u;
            document.getElementById('bAddr').innerText = acc.addr;
            document.getElementById('bEmail').innerText = acc.email;
            document.getElementById('bContact').innerText = acc.contact;
            
            if(u === 'admin') {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('invInput').style.display = 'block';
            }
            
            loadCloudInv();
        } else { alert("Login failed!"); }
    }

    function addStaff() {
        const u = prompt("Username:"), p = prompt("Password:"), ad = prompt("Address:"), em = prompt("Email:"), co = prompt("Contact:");
        if(u && p) {
            db_accs.push({u, p, addr:ad, email:em, contact:co});
            localStorage.setItem('sv_accs_v26', JSON.stringify(db_accs));
            alert("Branch Account Created!");
        }
    }

    // --- LINE 84 FIX APPLIED HERE ---
    async function saveItem() {
        const c = document.getElementById('iCat').value, d = document.getElementById('iDesc').value, p = document.getElementById('iPrice').value;
        if(!d || !p) return;
        if(editIdx === -1) db_inv.push({c, d, p:parseFloat(p)});
        else { db_inv[editIdx] = {c, d, p:parseFloat(p)}; editIdx = -1; document.getElementById('btnMain').innerText = "Add to Inventory"; }
        
        drawInv(); 
        document.getElementById('iDesc').value = ''; document.getElementById('iPrice').value = '';
        await saveCloudInv(); // Ni-remove na yung loadCloudInv() dito para hindi ma-overwrite ang UI
    }

    function drawInv() {
        const b = document.getElementById('invBody'); b.innerHTML = '';
        const isAdmin = (currentUser === 'admin');
        const fCat = document.getElementById('filterCat').value;

        db_inv.forEach((item, i) => {
            if(fCat !== "ALL" && item.c !== fCat) return;

            let adminBtns = isAdmin ? `
                <button onclick="editItem(${i})" style="background:#f39c12; color:white; border:none; padding:3px 6px; border-radius:4px; cursor:pointer;">✎</button>
                <button onclick="deleteItem(${i})" style="background:#e74c3c; color:white; border:none; padding:3px 6px; border-radius:4px; cursor:pointer;">X</button>
            ` : '';

            b.innerHTML += `<tr><td>${item.c}</td><td>${item.d}</td><td>${item.p.toLocaleString()}</td>
                <td><button onclick="addToCart(${i})" style="background:#27ae60; color:white; border:none; padding:3px 6px; border-radius:4px; cursor:pointer;">Add</button>${adminBtns}</td></tr>`;
        });
    }

    async function deleteItem(i) {
        if(confirm("Sigurado ka na papatayin mo itong item na 'to sa imbentaryo natin?")) {
            db_inv.splice(i,1);
            drawInv();
            await saveCloudInv();
        }
    }

    function editItem(i) {
        editIdx = i; const item = db_inv[i];
        document.getElementById('iCat').value = item.c; document.getElementById('iDesc').value = item.d; document.getElementById('iPrice').value = item.p;
        document.getElementById('btnMain').innerText = "Update Item";
    }

    function addToCart(i) {
        const item = db_inv[i], exist = cart.find(x => x.d === item.d);
        if(exist) exist.q++; else cart.push({...item, q:1});
        drawQuote();
    }

    function drawQuote() {
        const b = document.getElementById('quoteBody'); b.innerHTML = ''; let sum = 0;
        cart.forEach((item, i) => {
            let row = item.q * item.p; sum += row;
            b.innerHTML += `<tr><td style="text-align:center"><button class="no-print" onclick="changeQ(${i},-1)">-</button> ${item.q} <button class="no-print" onclick="changeQ(${i},1)">+</button></td><td>[${item.c}] ${item.d}</td><td style="text-align:right">${item.p.toLocaleString(undefined,{minimumFractionDigits:2})}</td><td style="text-align:right">${row.toLocaleString(undefined,{minimumFractionDigits:2})}</td></tr>`;
        });
        const cash = document.getElementById('cashMode').checked;
        if(cash) {
            document.getElementById('rowSRP').style.display = 'block'; document.getElementById('valSRP').innerText = sum.toLocaleString(undefined,{minimumFractionDigits:2});
            document.getElementById('lblTotal').innerText = "CASH PRICE"; document.getElementById('valGrand').innerText = (sum * 0.95).toLocaleString(undefined,{minimumFractionDigits:2});
        } else {
            document.getElementById('rowSRP').style.display = 'none'; document.getElementById('lblTotal').innerText = "TOTAL SRP"; document.getElementById('valGrand').innerText = sum.toLocaleString(undefined,{minimumFractionDigits:2});
        }
    }

    function changeQ(i, v) { cart[i].q += v; if(cart[i].q <= 0) cart.splice(i,1); drawQuote(); }
    function clearQuote() { cart = []; drawQuote(); }
    
    window.onload = () => { 
        document.getElementById('txtDate').innerText = new Date().toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}); 
    };
</script>
